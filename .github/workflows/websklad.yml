name: Update websklad feed

on:
  schedule:
    # Кожні 4 години
    - cron: '0 */4 * * *'
  workflow_dispatch:   # Запуск вручну

jobs:
  update-feed:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write

    steps:
      - name: Checkout main (скрипт)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run websklad processor
        run: node websklad-processor.js

      - name: Push websklad.xml → feeds-websklad branch
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout --orphan feeds-tmp
          git reset --hard

          cp websklad.xml /tmp/websklad.xml
          git checkout --orphan feeds-new
          git reset --hard
          mv /tmp/websklad.xml ./websklad.xml

          git add websklad.xml
          git commit -m "feed: websklad $(date -u '+%Y-%m-%d %H:%M UTC')"

          # Направляємо у нову власну гілку feeds-websklad
          git push origin HEAD:feeds-websklad --force
