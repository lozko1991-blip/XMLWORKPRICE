# Зберегти в репозиторії як: .github/workflows/update-ager-feed.yml
#
# Структура репозиторію lozko1991-blip/XMLWORKPRICE:
#   main гілка:  ager/process_feed.js  ← скрипт обробки
#                .github/workflows/update-ager-feed.yml
#   feeds гілка: ager_feed.xml         ← готовий фід (1 commit, без history!)
#
# Економія місця:
#   222MB сирий AGER фід ніколи не потрапляє в git.
#   В гілку feeds завжди force-push 1 commit → накопичення history відсутнє.
#   Реальний розмір файлу в репо ≈ 30-50 MB.

name: Update AGER feed

on:
  schedule:
    # 5 разів на добу: 01:00 / 06:00 / 11:00 / 16:00 / 21:00 UTC
    - cron: '0 1,6,11,16,21 * * *'
  workflow_dispatch:   # Запуск вручну з GitHub UI

jobs:
  update-feed:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write   # потрібно для git push

    steps:
      - name: Checkout main (для скрипту)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Копіюємо скрипт у /tmp
        run: cp AGER_process_feed.js /tmp/AGER_process_feed.js

      - name: Обробляємо AGER фід
        working-directory: /tmp
        run: node AGER_process_feed.js

      - name: Перевіряємо результат
        working-directory: /tmp
        run: |
          if [ ! -f ager_feed.xml ]; then
            echo "ERROR: ager_feed.xml не створений!"
            exit 1
          fi
          SIZE=$(wc -c < ager_feed.xml)
          echo "Розмір файлу: $(echo "$SIZE / 1024 / 1024" | bc) MB"
          if [ "$SIZE" -lt 100000 ]; then
            echo "ERROR: файл підозріло маленький ($SIZE байт)"
            exit 1
          fi

      - name: Публікуємо в гілку feeds (1 commit, без history)
        working-directory: /tmp
        run: |
          git init
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ager_feed.xml
          git commit -m "Feed $(date -u '+%Y-%m-%d %H:%M') UTC"
          git remote add origin \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/lozko1991-blip/XMLWORKPRICE.git"
          # Force push → замінює попередній commit, history не росте
          git push --force origin HEAD:refs/heads/feeds
